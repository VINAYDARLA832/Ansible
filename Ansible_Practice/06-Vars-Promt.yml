- name: variables from prompt
  hosts: localhost
  connection: local
  vars_prompt:
    - name: "name_student"
      prompt: "Enter your name"
      private: no
    - name: Password
      prompt: "Enter your password"
      private: yes
  tasks:
    - name: print variables from prompt
      ansible.builtin.debug:
        msg: "my name is {{ name_student }} and my password is {{ Password }}"