- name: checking variable preference
  hosts: localhost
  connection: local
  vars:
    name: "Variables from Play level"
  vars_files:
    - Course.yml
  vars_prompt:
    - name: "name"
      prompt: "Enter your name"
      private: no
  tasks:
    - name: testing variable preference
      vars:
        name: "Variables from task level"
      ansible.builtin.debug:
        msg: "Name: {{ name }}"
       