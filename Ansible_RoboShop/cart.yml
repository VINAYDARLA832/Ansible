- name: setting up the cart server
  hosts: cart
  become: yes
  tasks:
    - name: disbale the default Nodejs module
      ansible.builtin.command: dnf module disable nodejs -y

    - name: enable the NodeJs:20 module
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: Install the Nodejs module
      ansible.builtin.package:
        name: nodejs
        state: present
    
    - name: create roboshop system user
      ansible.builtin.user:
        name: roboshop
        comment: "RoboShop Application user"
        system: true
        shell: /sbin/nologin
        home: /app
    
    - name: remove app directory if exists
      ansible.builtin.file:
        path: /app
        state: absent
      
    - name: create application directory
      ansible.builtin.file:
        state: directory
        path: /app
    
    - name: Delete the cart file
      ansible.builtin.file:
        path: /app/cart.zip
        state: absent
    
    - name: download the application code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip 
        dest: /tmp/cart.zip

    - name: unzip the application code
      ansible.builtin.unarchive:
        src: /tmp/cart.zip
        dest: /app
        remote_src: yes

    - name: install the application dependencies
      community.general.npm:
        path: /app

    - name: copy the systemd service file
      ansible.builtin.copy:
        src: cart.service
        dest: /etc/systemd/system/cart.service
    
    - name: demaon reload
      ansible.builtin.systemd:
        name: cart
        enabled: yes
        state: restarted
        daemon_reload: yes