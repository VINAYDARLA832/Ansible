- name: setting up the catalogue server
  hosts: catalogue
  become: yes
  tasks:
    - name: disbale the default Nodejs module
      ansible.builtin.command: dnf module disable nodejs -y

    - name: enable the NodeJs:20 module
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: Install the Nodejs module
      ansible.builtin.package:
        name: nodejs
        state: present
    
    - name: create roboshop system user
      ansible.builtin.user:
        name: roboshop
        comment: "RoboShop Application User"
        system: true
        shell: /sbin/nologin
        home: /app
    
    - name: remove app directory if exists
      ansible.builtin.file:
        path: /app
        state: absent
      
    - name: create application directory
      ansible.builtin.file:
        state: directory
        path: /app
    
    - name: Delete the catalogue file
      ansible.builtin.file:
        path: /app/catalogue.zip
        state: absent
    
    - name: download the application code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
        dest: /tmp/catalogue.zip

    - name: unzip the application code
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: install the application dependencies
      community.general.npm:
        path: /app

    - name: copy the systemd service file
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service
    
    - name: copy mongo repo
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: install mongodb client
      ansible.builtin.package:
        name: mongodb-mongosh
        state: present
    
    - name: connect to mongodb catalogue
      ansible.builtin.command: mongosh --host mongodb.darlavinaykumar.fun --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
      register: catalogue_output

    - name: print the output of mongodb command
      ansible.builtin.debug:
        msg: "{{ catalogue_output.stdout }}"
    
    - name: load the catalogue schema
      ansible.builtin.shell: mongosh --host mongodb.darlavinaykumar.fun </app/db/master-data.js
      when: catalogue_output.stdout | int < 0
    
    # - name: start catalogue service
    #   ansible.builtin.service:
    #     name: catalogue
    #     state: started
    #     enabled: yes
    
    - name: daemon reload
      ansible.builtin.systemd:
        name: catalogue
        enabled: yes
        state: restarted
        daemon_reload: yes