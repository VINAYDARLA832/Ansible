- name: Configuring the payment server
  hosts: payment
  become: yes
  tasks:
    - name: Install python packages
      ansible.builtin.dnf:
        name: "{{ item }}"
        state: present
      loop:
        - python3
        - gcc
        - python3-devel

    - name: create roboshop system user
      ansible.builtin.user:
        name: roboshop
        comment: "RoboShop Application User"
        system: true
        shell: /sbin/nologin
        home: /app
    
    - name: remove app directory if exists
      ansible.builtin.file:
        path: /app
        state: absent
      
    - name: create application directory
      ansible.builtin.file:
        state: directory
        path: /app
    
    - name: Delete the payment file
      ansible.builtin.file:
        path: /app/payment.zip
        state: absent
    
    - name: download the application code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
        dest: /tmp/payment.zip

    - name: unzip the application code
      ansible.builtin.unarchive:
        src: /tmp/payment.zip
        dest: /app
        remote_src: yes
    - name: Install dependencies
      ansible.builtin.pip:
        requirements: requirements.txt
        executable: pip3.9
      args:
        chdir: /app
    - name: Copy payment service
      ansible.builtin.copy:
        src: payment.service
        dest: /etc/systemd/system/payment.service

    - name: daemon reload
      ansible.builtin.systemd.service:
        name: payment
        enabled: yes
        state: restarted
        daemon_reload: yes