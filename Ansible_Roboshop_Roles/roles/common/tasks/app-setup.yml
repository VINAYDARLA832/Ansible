- name: create roboshop system user
  ansible.builtin.user:
    name: roboshop
    comment: "RoboShop Application User"
    system: true
    shell: /sbin/nologin
    home: /app

- name: remove app directory if exists
  ansible.builtin.file:
    path: /app
    state: absent
  
- name: create application directory
  ansible.builtin.file:
    state: directory
    path: /app

- name: Delete the {{ component }} file
  ansible.builtin.file:
    path: /app/{{ component }}.zip
    state: absent

- name: download the application code
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip 
    dest: /tmp/{{ component }}.zip

- name: unzip the application code
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: yes
