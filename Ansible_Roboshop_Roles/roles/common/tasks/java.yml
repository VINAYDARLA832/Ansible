- name: install maven
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  loop:
    - maven
    - mysql

- name: Install dependencies
  ansible.builtin.command: mvn clean package
  args:
    chdir: /app

- name: move jar files
  ansible.builtin.command: mv target/{{ component }}-1.0.jar {{ component }}.jar
  args:
    chdir: /app